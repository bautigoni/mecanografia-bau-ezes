name: Deploy to VPS

# Triggers on every push to main. Runs the same manual steps from
# DEPLOY.md §7 over SSH, against the project's VPS at 168.75.68.75
# (project path /opt/apps/typely). Caddy is NOT reloaded here — the
# frontend container serves only loopback, so a compose recreate is
# enough; a manual `caddy validate && caddy reload` only matters when
# the Caddyfile itself changes.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/apps/typely
            echo "── git pull ──"
            git pull
            echo "── docker compose up -d --build ──"
            docker compose up -d --build
            echo "── smoke test ──"
            sleep 4
            curl -fsSI http://127.0.0.1:3005 >/dev/null && echo "frontend OK" || (echo "frontend FAILED"; exit 1)
            curl -fsSI http://127.0.0.1:3007/health >/dev/null && echo "api OK" || (echo "api FAILED"; exit 1)
            echo "── done ──"
