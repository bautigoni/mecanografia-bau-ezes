server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (Lighthouse "Best practices") ──
    # HSTS: Caddy termina TLS; el header viaja al navegador igual.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Anti-clickjacking + COOP. `same-origin-allow-popups` es necesario para
    # que el popup de Google Identity Services pueda comunicarse de vuelta.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP: 'self' + Google Identity Services + Google Fonts. 'unsafe-inline'
    # en style-src es necesario por los estilos inline de React/Tailwind.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com; connect-src 'self' https://accounts.google.com https://www.googleapis.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Disable strict access logging noise from healthchecks.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip text-like responses (Vite outputs hashed bundles, so it's safe and cheap).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # Long-cache hashed build assets emitted by Vite into /assets/.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Never cache the entry document so users always pick up new builds.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: any unknown path is served by index.html so React Router
    # can handle the route client-side. Prevents 404s on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
