server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable strict access logging noise from healthchecks.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip text-like responses (Vite outputs hashed bundles, so it's safe and cheap).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # Long-cache hashed build assets emitted by Vite into /assets/.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Never cache the entry document so users always pick up new builds.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: any unknown path is served by index.html so React Router
    # can handle the route client-side. Prevents 404s on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
